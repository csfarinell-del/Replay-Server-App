# yaml-language-server: $schema=..\schemas\plugin_vs_replay_cfg.schema.json

# VSReplayPlugin Reference Configuration
# This file serves as an overview of all possible options with their default values.

# Replay file name, must be placed in AssettoServer folder
ReplayFile: replay.acreplay
# Start frame of the replay, to skip a part
StartFrame: 0
# Looping lap number, negative numbers are counted from the end
LoopLap: -2
# Start frame number for the looping part if greater than 0, will override the lap setting
LoopStart: 0
# End frame number for the looping part
LoopEnd: 0
# Number of cars that will auto start and keep looping when the server is launched
AutoStart: 0
# If greater than 0 cars will be this frames one from the other instead of evenly ditributed
AutoStartOffset: 0
# Number of cars that will start in a race session, the replay file must contains at least those
RaceCars: 0
# Enable if using an online recorded replay and cars are stuttering/shaking
RecalcVelocities: false
